<!DOCTYPE html>
<html>
<head>
<title>10 клас Поморцева</title>
</head>

<body>

<table border="0" cellspacing="0" cellpadding="0" width="800" height="800">

<tr>
    <td rowspan="4" bgcolor="yellow" width="150"></td>
    <td colspan="4" bgcolor="orange" height="120"></td>
</tr>

<tr>
    <td colspan="2" bgcolor="magenta" height="200"></td>
    <td bgcolor="yellow" width="150"></td>
    <td rowspan="4" bgcolor="green" width="120"></td>
</tr>

<tr>
    <td rowspan="2" bgcolor="green" width="150"></td>
    <td bgcolor="blue" width="150" height="200"></td>
    <td rowspan="2" bgcolor="yellow"></td>
</tr>

<tr>
    <td colspan="2" bgcolor="red" height="150"></td>
</tr>

<tr>
    <td colspan="4" bgcolor="orange" height="120"></td>
</tr>

</table>

</body>
</html>
